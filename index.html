<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YC Launches Scraper</title>
    <link rel="stylesheet" href="public/styles.css?v=20260430-3">
  </head>
  <body>
    <main class="shell">
      <section class="hero public-hero">
        <div>
          <p class="eyebrow">YC Launches</p>
          <p class="intro">
            Browse a static YC Launches dataset. Run the scraper locally to refresh the data.
          </p>
        </div>
      </section>

      <section class="toolbar panel">
        <div>
          <strong id="recordCount">0 launches</strong>
          <span id="metaText">No data loaded.</span>
        </div>
        <div class="search-box">
          <input id="search" type="search" placeholder="Search any field: startup, founder, URL, industry, tag">
          <button id="clearSearchBtn" type="button">Clear</button>
        </div>
        <div class="actions">
          <button id="csvBtn">Download CSV</button>
          <button id="jsonBtn">Download JSON</button>
        </div>
      </section>

      <p id="status" class="status" role="status"></p>

      <section class="table-wrap panel">
        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="public/app.js?v=20260430-3" type="module"></script>
  </body>
</html>
